services:
  - type: web
    name: querysage-backend
    env: python
    buildCommand: cd python-backend && pip install -r requirements.txt
    startCommand: cd python-backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.6
